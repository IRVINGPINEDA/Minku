services:
  db:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: coursite
      MYSQL_USER: coursite
      MYSQL_PASSWORD: coursite123
      MYSQL_ROOT_PASSWORD: root123
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot123 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  api:
    build:
      context: ./coursiteAPI
      dockerfile: Dockerfile
    environment:
      SPRING_DATASOURCE_URL: "jdbc:mysql://db:3306/coursite?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC"
      SPRING_DATASOURCE_USERNAME: "coursite"
      SPRING_DATASOURCE_PASSWORD: "coursite123"
      JWT_SECRET: "change-me-in-production"
      SECURITY_JWT_SECRET: "change-me-in-production"
      SECURITY_JWT_START: "Bearer"
      SECURITY_JWT_JWTDURATION: "86400000"
      SEND_GRID_API_KEY: "disabled"
      SEND_GRID_EMAIL: "no-reply@caleiro.online"
      APP_URL: "https://caleiro.online"
      APP_CORS_ALLOWED_ORIGINS: "https://caleiro.online,https://www.caleiro.online"
      ADMIN_EMAIL: "${ADMIN_EMAIL:-irvingpineda684@gmail.com}"
      ADMIN_PASSWORD: "${ADMIN_PASSWORD:-admin123!}"
      ADMIN_NAME: "${ADMIN_NAME:-Irving}"
      ADMIN_LASTNAME: "${ADMIN_LASTNAME:-Pineda}"
      AWS_S3_BUCKET: "${AWS_S3_BUCKET:-}"
      AWS_REGION: "${AWS_REGION:-us-east-1}"
      AWS_ACCESS_KEY_ID: "${AWS_ACCESS_KEY_ID:-}"
      AWS_SECRET_ACCESS_KEY: "${AWS_SECRET_ACCESS_KEY:-}"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 120s
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: "/api"
        REACT_APP_FIREBASE_API_KEY: "${REACT_APP_FIREBASE_API_KEY:-}"
        REACT_APP_FIREBASE_AUTH_DOMAIN: "${REACT_APP_FIREBASE_AUTH_DOMAIN:-}"
        REACT_APP_FIREBASE_PROJECT_ID: "${REACT_APP_FIREBASE_PROJECT_ID:-}"
        REACT_APP_FIREBASE_STORAGE_BUCKET: "${REACT_APP_FIREBASE_STORAGE_BUCKET:-}"
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: "${REACT_APP_FIREBASE_MESSAGING_SENDER_ID:-}"
        REACT_APP_FIREBASE_APP_ID: "${REACT_APP_FIREBASE_APP_ID:-}"
    environment:
      API_UPSTREAM: "http://api:8080"
      SERVER_NAME: "${SERVER_NAME:-caleiro.online}"
      CERTBOT_EMAIL: "${CERTBOT_EMAIL:-admin@caleiro.online}"
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - certbot-certs:/etc/letsencrypt
      - certbot-www:/var/www/certbot
    restart: unless-stopped

volumes:
  mysql-data:
  certbot-certs:
  certbot-www:
