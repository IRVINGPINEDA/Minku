services:
  db:
    image: mysql:8.0
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_DATABASE: ${DB_NAME:-coursite}
      MYSQL_USER: ${DB_USERNAME:-coursite}
      MYSQL_PASSWORD: ${DB_PASSWORD:-coursite123}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./coursiteAPI
      dockerfile: Dockerfile
      args:
        API_BUILD_MAX_HEAP_MB: ${API_BUILD_MAX_HEAP_MB:-384}
    environment:
      SERVER_PORT: 8080
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:--Xms128m -Xmx384m}
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-coursite}
      DB_USERNAME: ${DB_USERNAME:-coursite}
      DB_PASSWORD: ${DB_PASSWORD:-coursite123}
      JWT_SECRET: ${JWT_SECRET:-change-me}
      JWT_PREFIX: ${JWT_PREFIX:-Bearer}
      JWT_DURATION: ${JWT_DURATION:-86400000}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-disabled}
      SENDGRID_EMAIL: ${SENDGRID_EMAIL:-no-reply@caleiro.online}
      APP_URL: ${APP_URL:-https://caleiro.online}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-https://caleiro.online,https://www.caleiro.online}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-irvingpineda684@gmail.com}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123!}
      ADMIN_NAME: ${ADMIN_NAME:-Irving}
      ADMIN_LASTNAME: ${ADMIN_LASTNAME:-Pineda}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8080/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    expose:
      - "8080"
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        WEB_BUILD_MAX_OLD_SPACE_SIZE: ${WEB_BUILD_MAX_OLD_SPACE_SIZE:-1024}
        WEB_BUILD_GENERATE_SOURCEMAP: ${WEB_BUILD_GENERATE_SOURCEMAP:-false}
        REACT_APP_API_URL: ${REACT_APP_API_URL:-/api}
        REACT_APP_FIREBASE_API_KEY: ${REACT_APP_FIREBASE_API_KEY:-}
        REACT_APP_FIREBASE_AUTH_DOMAIN: ${REACT_APP_FIREBASE_AUTH_DOMAIN:-}
        REACT_APP_FIREBASE_PROJECT_ID: ${REACT_APP_FIREBASE_PROJECT_ID:-}
        REACT_APP_FIREBASE_STORAGE_BUCKET: ${REACT_APP_FIREBASE_STORAGE_BUCKET:-}
        REACT_APP_FIREBASE_MESSAGING_SENDER_ID: ${REACT_APP_FIREBASE_MESSAGING_SENDER_ID:-}
        REACT_APP_FIREBASE_APP_ID: ${REACT_APP_FIREBASE_APP_ID:-}
    environment:
      API_UPSTREAM: http://api:8080
      SERVER_NAME: ${SERVER_NAME:-caleiro.online}
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  mysql-data:
